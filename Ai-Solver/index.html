<html lang="En" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Chemist Lab Ai</title>
    <link rel="icon" href="../Chemistry-Lab-icon-512x512.png" type="image/png">
    <meta name="theme-color" content="#0f172a">
    <link rel="manifest" href="../manifest.json">
    <link type="text/css" rel="stylesheet" href="css/index.css">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="msapplication-navbutton-color" content="#0f172a">
    <meta name="msapplication-TileColor" content="#0f172a">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="marked.min.js"></script>
</head>

<body>
    <div class="header">
        <button class="back-btn">
            <i class="fas fa-arrow-left"></i>
        </button>
        <script>document.querySelector('.back-btn').addEventListener('click', function () {
                window.location.href = '../index';
            });</script>
        <button class="new-chat-btnh">
            <i class="fas fa-plus-square"></i>
        </button>
        <div class="header-content">
            <h1>Chemist lab Ai</h1>
            <p>Google's Advanced Ai</p>
        </div>
        <div class="header-actions">
            <button class="new-chat-btn" id="newChatBtn" title="New chat">
                <i class="fas fa-plus-square"></i>
            </button>
            <button class="header-action-btn" id="historyToggle">
                <i class="fas fa-history"></i>
            </button>
        </div>
    </div>

    <div class="chat-container" id="chatContainer">
        <!-- Messages will be dynamically added here -->
    </div>

    <div class="input-container" id="inputContainer">
        <textarea class="message-input" id="messageInput" placeholder="Write your message here..." rows="1"></textarea>
        <div class="input-actions">
            <button class="input-action-btn" id="attachImageBtn" title="Send image">
                <i class="fas fa-image"></i>
            </button>
        </div>
        <button class="send-btn" id="sendBtn" disabled>
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>

    <div class="history-panel" id="historyPanel">
        <div class="history-header">
            <button class="new-chat-btn" id="newChatBtn" title="New chat">
                <i class="fas fa-plus-square"></i>
            </button>
            <div class="history-title">Chats history</div>
            <button class="close-history" id="closeHistory">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="history-list" id="historyList">
            <!-- History items will be dynamically added here -->
        </div>
        <div class="history-actions">
            <button class="clear-history-btn" id="clearHistoryBtn">
                <i class="fas fa-trash"></i>
                Clear all history
            </button>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>

    <input type="file" id="imageInput" accept="image/*" style="display: none;">

    <script src="index.js" defer></script>
</body>

</html>
