<!DOCTYPE html>
<html lang="fa">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a">
    <link type="text/css" rel="stylesheet" href="css/font.css">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="msapplication-navbutton-color" content="#0f172a">
    <meta name="msapplication-TileColor" content="#0f172a">
    <link rel="icon" href="settings.png" type="image/png">
    <title>تنظیمات</title>
    <style>
        body {
            font-family: 'GraphikArabic', sans-serif;
            text-align: center;
            background-color: #0f172a;
            color: white;
            margin: 0;
            padding: 20px;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0px 4px 15px rgba(255, 255, 255, 0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .container h1 {
            font-family: 'Estedad-MDarvishi', sans-serif;
            font-size: 50px;
            text-shadow: 0 6px 8px rgb(0, 0, 0, 0.2);
        }

        .back-button {
            position: absolute;
            width: 40px;
            height: 40px;
            background-image: url('css/assets/back-button.png');
            background-color: #1e293b;
            background-size: cover;
            text-decoration: none;
            display: inline-block;
            top: -455px;
            left: 25px;
            border: none;
            cursor: pointer;
            margin-bottom: 100px;
        }

        .setting-item {
            margin: 20px 0;
            font-family: 'GraphikArabic', sans-serif;
            text-align: center;
        }

        label {
            font-family: 'GraphikArabic', sans-serif;
            font-size: 20px;
            margin-left: 10px;
        }

        button {
            font-family: 'GraphikArabic', sans-serif;
            padding: 10px;
            font-size: 18px;
            border-radius: 5px;
            border: none;
            background: #3b4252;
            color: white;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: 0.4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: 0.4s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: #055be6;
        }

        input:checked+.slider:before {
            transform: translateX(26px);
        }

        button {
            cursor: pointer;
            background-color: #055be6;
            gap: 10px;
            margin-top: 480px;
            margin-bottom: 15px;
        }

        .light-theme {
            background-color: #e2e2e2 !important;
            color: #000000 !important;
        }

        .light-theme .container {
            background: #c7c7c7 !important;
        }

        .light-theme .back-button {
            background-image: url(css/assets/back-buttonB.png) !important;
            background-color: #c7c7c7 !important;
        }

        .light-theme .back-button {
            color: rgb(0, 0, 0) !important;
        }

        .light-theme .slider {
            position: absolute !important;
            background-color: #adadad !important;
        }

        .light-theme input:checked+.light-theme .slider {
            background-color: #26a4da !important;
        }

        .light-theme input:checked+.light-theme .slider:before {
            transform: translateX(26px) !important;
        }

        .light-theme button {
            cursor: pointer;
            background-color: #26a4da !important;
            color: #2b2b2b !important;
        }
    </style>
</head>

<body>
    <div class="container">
        <button class="back-button" onclick="goBack()"></button>
        <h1>تنظیمات</h1>
        <div class="setting-item">
            <label for="theme-toggle">حالت شب:</label>
            <label class="switch">
                <input type="checkbox" id="theme-toggle">
                <span class="slider"></span>
            </label>
        </div>
        <button onclick="saveSettings()">ذخیره تغییرات</button>
    </div>
    <script>
        function goBack() {
            window.location.href = "https://mrmr-711.github.io/Web-Chemistry-Lab";
        }

        document.addEventListener("DOMContentLoaded", function () {
            const savedTheme = localStorage.getItem("theme") || "dark";
            const isLightTheme = savedTheme === "light";

            document.body.classList.toggle("light-theme", isLightTheme);
            document.getElementById("theme-toggle").checked = savedTheme === "dark";

            // تنظیم رنگ اولیه برای متا تگها
            const initialColor = isLightTheme ? "#e2e2e2" : "#0f172a"; // رنگ جدید برای حالت روز
            document.querySelector('meta[name="theme-color"]').setAttribute("content", initialColor);
            document.querySelector('meta[name="apple-mobile-web-app-status-bar-style"]').setAttribute("content", savedTheme === "dark" ? "black-translucent" : "default");
            document.querySelector('meta[name="msapplication-navbutton-color"]').setAttribute("content", initialColor);
            document.querySelector('meta[name="msapplication-TileColor"]').setAttribute("content", initialColor);
        });

        document.getElementById("theme-toggle").addEventListener("change", function () {
            const newTheme = this.checked ? "dark" : "light";
            document.body.classList.toggle("light-theme", newTheme === "light");

            // تغییر متا تگها
            const color = newTheme === "light" ? "#e2e2e2" : "#0f172a"; // رنگ جدید برای حالت روز
            // آپدیت theme-color برای مرورگرهای معمولی و PWA
            document.querySelector('meta[name="theme-color"]').setAttribute("content", color);
            // آپدیت برای مرورگرهای اپل (Safari)
            document.querySelector('meta[name="apple-mobile-web-app-status-bar-style"]').setAttribute("content", newTheme === "dark" ? "black-translucent" : "default");
            // آپدیت برای مرورگرهای مایکروسافت (Edge)
            document.querySelector('meta[name="msapplication-navbutton-color"]').setAttribute("content", color);
            document.querySelector('meta[name="msapplication-TileColor"]').setAttribute("content", color);
        });

        function saveSettings() {
            localStorage.setItem("theme", document.getElementById("theme-toggle").checked ? "dark" : "light");
            alert("تنظیمات ذخیره شد!");
        }
    </script>
</body>

</html>
